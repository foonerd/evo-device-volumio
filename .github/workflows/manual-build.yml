# Manual: cross-build, sign-smoke, optional upload — same as continuous-dev but for an arbitrary ref and a recorded channel. See SHOWCASE section 7.
name: manual-build

"on":
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or full SHA)"
        type: string
        default: main
      channel:
        description: "Artefact channel to record in logs (dev / test / prod) — no publish yet"
        type: choice
        options: [dev, test, prod]
        default: dev

env:
  EVO_CORE_TAG: v0.1.9
  CROSS_AARCH64_TARGET: aarch64-unknown-linux-gnu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - name: Log destination channel
        run: |
          echo "Building @ ${{ inputs.ref }}; intended channel: ${{ inputs.channel }} (publishing to artefacts is not wired yet)"
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy, rustfmt
      - name: Set up Docker / Buildx
        uses: docker/setup-buildx-action@v4
      - name: Install cross
        run: cargo install cross --locked
      - name: Clone evo-core
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: ./scripts/ci/setup-evo-core.sh
      - name: Fmt, clippy, test
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --workspace
      - name: Cross build (aarch64, release) when workspace has plugin members
        run: |
          : "${EVO_CORE:?EVO_CORE must be set (see setup-evo-core)}"
          if [ -d plugins ] && [ -n "$(ls -A plugins 2>/dev/null | grep -v '^\.gitkeep$' || true)" ]; then
            cross build --release --target "$CROSS_AARCH64_TARGET" --workspace
          else
            echo "No plugin crates to cross-build; skipping (brand-neutral plugins migrated to evo-plugins-audio per ADR-0026; first vendor-specific plugin pending)."
          fi
