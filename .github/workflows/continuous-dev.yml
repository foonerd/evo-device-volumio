# On code/catalogue changes to main: cross-compile (aarch64), sign-smoke, optional artefact upload.
# Publishing to foonerd/evo-device-volumio-artefacts is deferred until the artefact manifest and token are wired. See SHOWCASE section 7.
name: continuous-dev

"on":
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "crates/**"
      - "catalogue/**"
      - "ci/**"
      - "keys/**"
      - "Cargo.toml"
      - "Cross.toml"
      - "scripts/**"
      - ".github/**"

concurrency:
  group: continuous-dev-main
  cancel-in-progress: true

env:
  EVO_CORE_TAG: v0.1.9
  CROSS_AARCH64_TARGET: aarch64-unknown-linux-gnu

jobs:
  build-sign-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy, rustfmt
      - name: Set up Docker / Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install cross
        run: cargo install cross --locked
      - name: Clone evo-core (sibling, for path dependency and evo-plugin-tool)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: ./scripts/ci/setup-evo-core.sh
      - name: Fmt, clippy, test
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --workspace
      - name: Cross build plugins (aarch64, release) when workspace has plugin members
        run: |
          : "${EVO_CORE:?EVO_CORE must be set (see setup-evo-core)}"
          if [ -d plugins ] && [ -n "$(ls -A plugins 2>/dev/null | grep -v '^\.gitkeep$' || true)" ]; then
            cross build --release --target "$CROSS_AARCH64_TARGET" --workspace
          else
            echo "No plugin crates to cross-build; skipping (brand-neutral plugins migrated to evo-plugins-audio per ADR-0026; first vendor-specific plugin pending)."
          fi
