# PR and branch push: host-side fmt, clippy, tests, and a sibling evo-core checkout for the path dependency
name: build

"on":
  pull_request: {}
  push: {}

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - name: Clone evo-core (sibling, for path dependency)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: ./scripts/ci/setup-evo-core.sh
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
